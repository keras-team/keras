name: Gemini Automated Issue Fix

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto_fix:
    name: 'Generate Fix with Gemini'
    runs-on: ubuntu-latest
    if: github.event.label.name == 'type:auto-fix'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2

      - name: 'Fetch Issue and Comments'
        uses: 'actions/github-script@v7'
        id: 'fetch_context'
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'
          script: |-
            const issueNumber = context.issue.number;
            core.info(`Fetching comments for issue #${issueNumber}`);
            
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            });
            
            const commentsText = comments.data.map(c => `Comment by @${c.user.login}:\n${c.body}`).join('\n---\n');
            core.setOutput('comments_context', commentsText);
            core.info(`Fetched ${comments.data.length} comments.`);

      - name: 'Search Codebase for Context'
        uses: 'actions/github-script@v7'
        id: 'search_codebase'
        env:
          ISSUE_TITLE: '${{ github.event.issue.title }}'
          ISSUE_BODY: '${{ github.event.issue.body }}'
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'
          script: |-
            const fs = require('fs');
            const { execSync } = require('child_process');

            const title = process.env.ISSUE_TITLE || '';
            const body = process.env.ISSUE_BODY || '';
            const searchTerms = (title + ' ' + body).split(/\W+/).filter(word => word.length > 3).slice(0, 5); // top 5 words

            let searchContext = '### Relevant Code Snippets\n\n';
            let filesFound = new Set();

            if (searchTerms.length > 0) {
              const query = searchTerms[0]; // fallback search on first term
              try {
                const gitGrepOutput = execSync(`git grep -l "${query}" -- keras/ || true`, { encoding: 'utf-8' });
                const files = gitGrepOutput.split('\n').filter(Boolean).slice(0, 3);
                
                for (const file of files) {
                  const content = fs.readFileSync(file, 'utf8');
                  filesFound.add(file);
                  // Grab first 30 lines
                  searchContext += `#### File: [${file}](file:///${file})\n\`\`\`python\n${content.split('\n').slice(0, 30).join('\n')}\n\`\`\`\n\n`;
                }
              } catch (e) {
                core.warning(`Error running git grep: ${e.message}`);
              }
            }
            if (filesFound.size === 0) {
              searchContext += 'No specific code snippets found.\n';
            }
            core.setOutput('search_context', searchContext);

      - name: 'Pre-create .gemini directory'
        run: mkdir -p ~/.gemini

      - name: 'Run Gemini Fix Generation'
        uses: 'google-github-actions/run-gemini-cli@a3bf79042542528e91937b3a3a6fbc4967ee3c31'
        id: 'gemini_fix'
        env:
          ISSUE_TITLE: '${{ github.event.issue.title }}'
          ISSUE_BODY: '${{ github.event.issue.body }}'
          ISSUE_COMMENTS: '${{ steps.fetch_context.outputs.comments_context }}'
          SEARCH_CONTEXT: '${{ steps.search_codebase.outputs.search_context }}'
          GITHUB_TOKEN: '' # Unset for yolo
        with:
          gemini_api_key: '${{ secrets.GEMINI_API }}'
          gemini_model: 'gemini-2.5-pro'
          settings: |-
            {
              "maxSessionTurns": 5,
              "telemetry": {
                "enabled": false
              }
            }
          prompt: |-
            ## Role

            You are a fix-generator for Keras. Your role is to read an issue (including its comments) and determine a code fix.

            ## Context
            - Issue Title: ${{ env.ISSUE_TITLE }}
            - Issue Body: ${{ env.ISSUE_BODY }}
            - Issue Comments: ${{ env.ISSUE_COMMENTS }}
            - Codebase Search Context: ${{ env.SEARCH_CONTEXT }}

            ## Steps
            1. Analyze the issue and comments. Find the bug context.
            2. Propose a drop-in replacement for the modified file(s).
            3. Output your response in the JSON format specified below.

            ## Output Format
            Your output must be a valid JSON object with the following schema:
            {
              "files_to_modify": [
                {
                  "path": "keras/src/layers/core.py",
                  "content": "new python code here..."
                }
              ]
            }

            ## Guidelines
            - Output only the JSON object.
            - Provide a full drop-in replacement of the python file contents in `content` if you modify it.

      - name: 'Apply Fixes'
        if: |-
          ${{ steps.gemini_fix.outputs.summary != '' }}
        env:
          GEMINI_OUTPUT: '${{ steps.gemini_fix.outputs.summary }}'
        uses: 'actions/github-script@v7'
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'
          script: |
            const fs = require('fs');
            const path = require('path');
            const rawOutput = process.env.GEMINI_OUTPUT;
            let parsed;
            try {
              parsed = JSON.parse(rawOutput);
            } catch (jsonError) {
              const jsonMatch = rawOutput.match(/```json\s*([\s\S]*?)\s*```/);
              if (jsonMatch && jsonMatch[1]) {
                parsed = JSON.parse(jsonMatch[1].trim());
              } else {
                const jsonObjMatch = rawOutput.match(/(\{[\s\S]*"files_to_modify"[\s\S]*\})/);
                if (jsonObjMatch) { parsed = JSON.parse(jsonObjMatch[0]); }
                else { core.setFailed("Could not parse JSON output."); return; }
              }
            }

            const filesToModify = parsed.files_to_modify || [];
            for (const fileObj of filesToModify) {
              core.info(`Applying changes to ${fileObj.path}`);
              try {
                fs.writeFileSync(fileObj.path, fileObj.content);
              } catch (e) {
                core.warning(`Failed to write to ${fileObj.path}: ${e.message}`);
              }
            }

      - name: 'Create Pull Request'
        uses: 'peter-evans/create-pull-request@v8'
        id: 'create_pr'
        with:
          token: '${{ secrets.GITHUB_TOKEN }}'
          branch: "auto-fix-${{ github.event.issue.number }}"
          title: "Automated Fix For Issue #${{ github.event.issue.number }}"
          commit-message: 'Automated fix pushed by Gemini'
          body: 'This PR branch was automatically created by Gemini to fix the issue after label type:auto-fix was applied.'
          draft: true

      - name: 'Post PR Link to Issue'
        if: |-
          ${{ steps.create_pr.outputs.pull-request-number != '' }}
        uses: 'actions/github-script@v7'
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'
          script: |
            const prNumber = '${{ steps.create_pr.outputs.pull-request-number }}';
            const issueNumber = context.issue.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `I have generated a potential fix in Draft PR #${prNumber}.`
            });
